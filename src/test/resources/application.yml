spring:
  datasource:
    url: jdbc:h2:mem:testdb;MODE=MySQL;DB_CLOSE_DELAY=-1
    username: sa
    password: ""
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  flyway:
    enabled: false

app:
  seed:
    admin:
      enabled: false
      username: ""
      password: ""
      email: ""
      full-name: ""
  jwt:
    secret: test-only-jwt-secret-do-not-use-in-production-32chars-min
    issuer: customer-support-hub-test
    ttl-minutes: 60
